<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube</title>
<meta name="theme-color" content="#0f0f0f">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f0f; color: #fff; font-family: -apple-system, sans-serif; }
#app { max-width: 480px; margin: 0 auto; }
header {
  position: fixed; top: 0; left: 0; right: 0;
  background: #0f0f0f; padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 100;
}
.logo { color: #fff; font-size: 20px; font-weight: 700; }
.logo span { color: #ff0000; }
.header-icons { display: flex; gap: 16px; }
.header-icons button {
  background: none; border: none; color: #fff; font-size: 20px; cursor: pointer;
}
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #0f0f0f; display: flex;
  border-top: 1px solid #272727;
}
.tab-btn {
  flex: 1; padding: 12px; background: none; border: none;
  color: #aaa; font-size: 11px; display: flex;
  flex-direction: column; align-items: center; gap: 4px; cursor: pointer;
}
.tab-btn.active { color: #fff; }
.tab-btn svg { width: 24px; height: 24px; fill: currentColor; }
.content { margin-top: 56px; margin-bottom: 60px; padding: 8px; }
.video-card {
  margin-bottom: 16px; cursor: pointer;
}
.thumb { width: 100%; aspect-ratio: 16/9; background: #272727; border-radius: 8px; }
.video-info { display: flex; gap: 10px; margin-top: 8px; }
.channel-icon {
  width: 36px; height: 36px; border-radius: 50%; background: #555; flex-shrink: 0;
}
.video-meta h3 { font-size: 14px; line-height: 1.4; }
.video-meta p { font-size: 12px; color: #aaa; margin-top: 2px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo"><span>You</span>Tube</div>
    <div class="header-icons">
      <button>🔍</button>
      <button>🔔</button>
    </div>
  </header>

  <div class="content" id="content">
    <p style="color:#aaa; text-align:center; padding:40px 0;">読み込み中...</p>
  </div>

  <nav class="tab-bar">
    <button class="tab-btn" id="tab-home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      ホーム
    </button>
    <button class="tab-btn active" id="tab-subs" onclick="switchTab('subs')">
      <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zm-7-8v2h18v-2H3zm3-6v2h12V4H6z"/></svg>
      登録チャンネル
    </button>
  </nav>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}
</script>
</body>
</html>
